    <line x1="100" y1="82" x2="100" y2="88"/>
    <line x1="100" y1="112" x2="100" y2="118"/>
    <line x1="82" y1="100" x2="88" y2="100"/>
    <line x1="112" y1="100" x2="118" y2="100"/>
