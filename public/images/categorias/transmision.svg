<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="24" fill="#f1f5f9"/>
  <!-- Disco de embrague -->
  <circle cx="100" cy="100" r="60" fill="#e2e8f0" stroke="#475569" stroke-width="3"/>
  <circle cx="100" cy="100" r="46" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <!-- Muelles del disco -->
  <g fill="#2563eb" stroke="#1d4ed8" stroke-width="2">
    <rect x="90" y="62" width="20" height="12" rx="6"/>
    <rect x="124" y="86" width="20" height="12" rx="6" transform="rotate(72 134 92)"/>
