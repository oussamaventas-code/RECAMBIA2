<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="24" fill="#f1f5f9"/>
  <!-- Cuerpo del filtro de aceite -->
  <rect x="62" y="58" width="76" height="92" rx="10" fill="#e2e8f0" stroke="#475569" stroke-width="3"/>
  <!-- Estrías laterales -->
  <g stroke="#94a3b8" stroke-width="2">
    <line x1="74" y1="66" x2="74" y2="142"/>
    <line x1="88" y1="66" x2="88" y2="142"/>
    <line x1="100" y1="66" x2="100" y2="142"/>
    <line x1="112" y1="66" x2="112" y2="142"/>
    <line x1="126" y1="66" x2="126" y2="142"/>
  </g>
  <!-- Tapa superior -->
  <rect x="56" y="44" width="88" height="18" rx="6" fill="#2563eb" stroke="#1d4ed8" stroke-width="2.5"/>
  <!-- Rosca inferior -->
  <rect x="80" y="150" width="40" height="12" rx="4" fill="#64748b"/>
  <ellipse cx="100" cy="166" rx="14" ry="5" fill="#475569"/>
  <!-- Etiqueta -->
  <rect x="72" y="90" width="56" height="26" rx="5" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <line x1="80" y1="99" x2="120" y2="99" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="108" x2="108" y2="108" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>
</svg>
